<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liham Pahintulot Online - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root {
      --pandayan-burgundy: #800020;
      --pandayan-yellow: #FFD700;
      --pandayan-blue: #0000FF;
      --pandayan-white: #FFFFFF;
    }
    body {
      background-color: #f4f7f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: white;
      border-radius: 16px;
      border: 3px solid var(--pandayan-burgundy);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }
    .auth-header {
      background-color: var(--pandayan-burgundy);
      color: white;
      padding: 25px 20px;
      text-align: center;
      border-bottom: 5px solid var(--pandayan-yellow);
    }
    .auth-header h3 {
      font-weight: 900;
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: white;
    }
    .btn-pandayan {
      background-color: var(--pandayan-burgundy);
      color: white;
      font-weight: bold;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      transition: all 0.3s ease;
    }
    .btn-pandayan:hover {
      background-color: #600018;
      color: white;
    }
    .btn-manual {
      background-color: rgba(128, 0, 32, 0.08);
      color: var(--pandayan-burgundy);
      font-weight: bold;
      border-radius: 8px;
      padding: 10px;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 15px;
      border: 1px dashed var(--pandayan-burgundy);
      font-size: 0.85rem;
    }
    .btn-manual:hover {
      background-color: var(--pandayan-burgundy);
      color: white;
    }
    .form-control:focus {
      border-color: var(--pandayan-burgundy);
      box-shadow: 0 0 0 0.25rem rgba(128, 0, 32, 0.15);
    }
    .link-toggle {
      color: var(--pandayan-burgundy);
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }
    .input-group-text {
      background-color: #f8f9fa;
      border-left: none;
      cursor: pointer;
    }
    .input-group-text:hover {
      color: var(--pandayan-burgundy);
    }

    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(128, 0, 32, 0.88); z-index: 9999;
      display: none; flex-direction: column; justify-content: center; align-items: center; color: white;
    }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div class="spinner-border text-warning mb-3" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
    <h5 class="fw-bold text-warning mb-1" id="loadingText">PRO-PROSESO...</h5>
    <small class="text-white">Mangyaring maghintay nang ilang sandali.</small>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <h3>PANDAYAN SUPERSTORES</h3>
      <small class="text-warning fw-bold">Liham Pahintulot Online Portal</small>
    </div>
    
    <div class="p-4">
      <form id="loginForm">
        <h5 class="text-center mb-4 fw-bold" style="color: var(--pandayan-burgundy);">LOG IN</h5>
        
        <div class="mb-3">
          <label class="form-label small fw-bold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="fa fa-user text-muted"></i></span>
            <input type="text" id="loginUsername" class="form-control border-start-0" placeholder="Ilagay ang iyong username" required>
          </div>
        </div>
        
        <div class="mb-3">
          <label class="form-label small fw-bold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="fa fa-lock text-muted"></i></span>
            <input type="password" id="loginPassword" class="form-control border-start-0 border-end-0" placeholder="Ilagay ang iyong password" required>
            <span class="input-group-text" onclick="togglePasswordVisibility('loginPassword', 'toggleLoginIcon')">
              <i class="fa-solid fa-eye" id="toggleLoginIcon"></i>
            </span>
          </div>
        </div>
        
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label small fw-bold text-secondary" for="rememberMe">
            Tandaan ako (Remember Me)
          </label>
        </div>
        
        <button type="submit" class="btn btn-pandayan shadow-sm" id="loginBtn">LOG IN</button>
      </form>

      <form id="registerForm" style="display: none;">
        <h5 class="text-center mb-4 fw-bold" style="color: var(--pandayan-burgundy);">Gumawa ng Account</h5>
        
        <div class="mb-3">
          <label class="form-label small fw-bold">Kapwa Name</label>
          <input type="text" id="regKapwaName" class="form-control" placeholder="Pangalan (hal. Kapwa Juan)" required>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Email Address</label>
          <input type="email" id="regEmail" class="form-control" placeholder="halimbawa@pandayan.com.ph" required>
          <small class="text-muted" style="font-size:0.72rem;">Dito ipapadala ang mga email status updates.</small>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Username</label>
          <input type="text" id="regUsername" class="form-control" placeholder="Pumili ng Username" required>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Password</label>
          <div class="input-group">
            <input type="password" id="regPassword" class="form-control border-end-0" placeholder="Pumili ng Password" required>
            <span class="input-group-text" onclick="togglePasswordVisibility('regPassword', 'toggleRegIcon')">
              <i class="fa-solid fa-eye" id="toggleRegIcon"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-pandayan shadow-sm mt-2" id="regBtn">MAG-REGISTER</button>
      </form>

      <hr class="my-4">

      <div class="text-center small">
        <p id="toggleToRegister" class="m-0">Wala pang account? <span class="link-toggle" onclick="showRegister()">Gumawa ng Account</span></p>
        <p id="toggleToLogin" class="m-0" style="display: none;">May account na? <span class="link-toggle" onclick="showLogin()">LOG IN</span></p>
      </div>

      <a href="https://www.canva.com/design/DAHO99_dbI4/uEJq-K6hj4-9IilTL0TYQA/view?utm_content=DAHO99_dbI4&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=ha0ebe4be46#12" target="_blank" class="btn-manual shadow-sm">
        ❓ Paano gamitin ang App? (User Manual)
      </a>
    </div>
  </div>

  <script>
    // BAGONG DEPLOYED API URL
    const API_URL = "https://script.google.com/macros/s/AKfycbya8PxHU-qOdKHeAQhdcVNlp-F7X99pAWOfRAUvBtijG6Oq6zisWDYATOh4V-dP4l-W/exec";

    function showSpinner(text = "PRO-PROSESO...") {
      document.getElementById("loadingText").innerText = text;
      document.getElementById("loadingOverlay").style.display = "flex";
    }
    function hideSpinner() {
      document.getElementById("loadingOverlay").style.display = "none";
    }

    function togglePasswordVisibility(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        passwordInput.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }

    window.onload = function() {
      const savedUser = localStorage.getItem("pandayan_user_session") || sessionStorage.getItem("pandayan_user_session");
      if (savedUser) { window.location.href = "dashboard.html"; }
    };

    function showRegister() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
      document.getElementById("toggleToRegister").style.display = "none";
      document.getElementById("toggleToLogin").style.display = "block";
    }

    function showLogin() {
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("toggleToLogin").style.display = "none";
      document.getElementById("toggleToRegister").style.display = "block";
    }

    document.getElementById("loginForm").onsubmit = function(e) {
      e.preventDefault();
      const u = document.getElementById("loginUsername").value.trim();
      const p = document.getElementById("loginPassword").value.trim();
      const remember = document.getElementById("rememberMe").checked;

      showSpinner("Loading...");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", payload: { username: u, password: p } })
      })
      .then(res => res.json())
      .then(res => {
        hideSpinner();
        if (res.status === "success") {
          if (remember) {
            localStorage.setItem("pandayan_user_session", JSON.stringify(res.user));
          } else {
            sessionStorage.setItem("pandayan_user_session", JSON.stringify(res.user));
          }

          Swal.fire({
            title: "Mabuhay!", text: "Maligayang pagbabalik, " + res.user.kapwaName + "!", icon: "success", confirmButtonColor: "#800020"
          }).then(() => { window.location.href = "dashboard.html"; });
        } else {
          Swal.fire("Login Failed", res.message, "error");
        }
      })
      .catch(err => { hideSpinner(); Swal.fire("Error", "Hindi makakonekta sa server.", "error"); });
    };

    document.getElementById("registerForm").onsubmit = function(e) {
      e.preventDefault();
      const k = document.getElementById("regKapwaName").value.trim();
      const em = document.getElementById("regEmail").value.trim();
      const u = document.getElementById("regUsername").value.trim();
      const p = document.getElementById("regPassword").value.trim();

      showSpinner("IPINAPADALA ANG ACCOUNT...");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "register", payload: { kapwaName: k, email: em, username: u, password: p } })
      })
      .then(res => res.json())
      .then(res => {
        hideSpinner();
        if (res.status === "success") {
          Swal.fire({ title: "Account Created!", text: res.message, icon: "success", confirmButtonColor: "#800020" }).then(() => {
            document.getElementById("registerForm").reset(); showLogin();
          });
        } else { Swal.fire("Registration Error", res.message, "error"); }
      })
      .catch(err => { hideSpinner(); Swal.fire("Error", "Hindi makakonekta sa server.", "error"); });
    };
  </script>
</body>
</html>
